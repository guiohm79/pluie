title: Météo
views:
  - title: Vue d'ensemble
    path: meteo
    icon: mdi:weather-partly-cloudy
    badges: []
    cards:
      # Entête avec carte météo actuelle
      - type: weather-forecast
        entity: weather.maison
        forecast: true
        hourly_forecast: false
      
      # Grille avec infos actuelles
      - type: grid
        columns: 3
        square: false
        cards:
          # Température
          - type: entity
            entity: sensor.temperature_exterieure
            name: Température
            icon: mdi:thermometer
          
          # Humidité
          - type: entity
            entity: sensor.humidite_exterieure
            name: Humidité
            icon: mdi:water-percent
          
          # Pression
          - type: entity
            entity: sensor.pression_atmospherique
            name: Pression
            icon: mdi:gauge
      
      # Ta belle carte pluviomètre
      - type: custom:rain-gauge-card
        entity: sensor.pluviometre_gui
        title: Pluviomètre
        chart_type: daily
        days_to_show: 30
      
      # Graphique température vs humidité
      - type: statistics-graph
        title: Température et Humidité
        entities:
          - entity: sensor.temperature_exterieure
            name: Température
          - entity: sensor.humidite_exterieure
            name: Humidité
        days_to_show: 3
        stat_types:
          - mean
          - min
          - max
        period: hour
      
      # Historique des précipitations
      - type: history-graph
        title: Historique des précipitations
        entities:
          - entity: sensor.pluviometre_gui
            name: Pluie (mm)
        hours_to_show: 72
      
      # Alertes météo (si tu as un sensor approprié)
      - type: conditional
        conditions:
          - entity: binary_sensor.alerte_meteo
            state: "on"
        card:
          type: markdown
          content: >-
            ## ⚠️ Alerte Météo
            
            {{ states.sensor.alerte_meteo_texte.state }}
            
            Dernière mise à jour: {{ states.sensor.alerte_meteo_texte.last_updated.strftime('%d/%m à %H:%M') }}
          style: |
            ha-card {
              background-color: rgba(255, 87, 34, 0.2);
              border-left: 4px solid #ff5722;
              padding: 8px;
            }
      
  # Vue détaillée des précipitations
  - title: Précipitations
    path: precipitations
    icon: mdi:weather-pouring
    cards:
      # Statistiques pluie du mois
      - type: statistics-graph
        title: Précipitations du mois
        entities:
          - entity: sensor.pluviometre_gui
        period: month
        stat_types:
          - sum
          - mean
          - min
          - max
      
      # Vue cumulative (ta carte en mode cumul)
      - type: custom:rain-gauge-card
        entity: sensor.pluviometre_gui
        title: Cumul des précipitations
        chart_type: cumulative
        days_to_show: 365
      
      # Comparaison avec la normale saisonnière
      - type: markdown
        title: Comparaison avec la normale saisonnière
        content: >-
          {% set cumul_mensuel = states('sensor.cumul_pluie_mensuel') | float %}
          {% set normale_mensuelle = states('sensor.normale_pluie_mensuelle') | float %}
          {% set ratio = (cumul_mensuel / normale_mensuelle * 100) | round if normale_mensuelle > 0 else 0 %}
          
          ## Cumul du mois: {{ cumul_mensuel }} mm
          
          Normale pour {{ now().strftime('%B') }}: {{ normale_mensuelle }} mm
          
          {% if ratio > 130 %}
            ### 🌧️ {{ ratio }}% de la normale
            **Mois très pluvieux** - {{ cumul_mensuel - normale_mensuelle }} mm au-dessus de la normale
          {% elif ratio > 100 %}
            ### 🌦️ {{ ratio }}% de la normale
            **Mois pluvieux** - {{ cumul_mensuel - normale_mensuelle }} mm au-dessus de la normale
          {% elif ratio > 70 %}
            ### ☁️ {{ ratio }}% de la normale
            **Mois normal** - {{ normale_mensuelle - cumul_mensuel }} mm en dessous de la normale
          {% else %}
            ### ☀️ {{ ratio }}% de la normale
            **Mois sec** - {{ normale_mensuelle - cumul_mensuel }} mm en dessous de la normale
          {% endif %}